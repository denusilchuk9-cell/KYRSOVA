name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Restore packages
      run: nuget restore ElectronicJournal/ElectronicJournal.csproj && nuget restore ElectronicJournal.Tests/ElectronicJournal.Tests.csproj
    
    - name: Build main project
      run: msbuild ElectronicJournal/ElectronicJournal.csproj /p:Configuration=Release
    
    - name: Build tests
      run: msbuild ElectronicJournal.Tests/ElectronicJournal.Tests.csproj /p:Configuration=Release
    
    - name: Test
      run: vstest.console.exe ElectronicJournal.Tests\bin\Release\ElectronicJournal.Tests.dll
