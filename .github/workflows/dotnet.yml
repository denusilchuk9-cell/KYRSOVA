name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Restore packages
      run: dotnet restore ElectronicJournal/ElectronicJournal.csproj
    
    - name: Build
      run: dotnet build ElectronicJournal/ElectronicJournal.csproj --configuration Release --no-restore
    
    - name: Test
      run: dotnet test ElectronicJournal.Tests/ElectronicJournal.Tests.csproj --configuration Release --no-build --verbosity normal
