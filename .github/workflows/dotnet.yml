name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Restore packages
      run: nuget restore ElectronicJournal/ElectronicJournal/ElectronicJournal.csproj
    
    - name: Build
      run: msbuild ElectronicJournal/ElectronicJournal/ElectronicJournal.csproj /p:Configuration=Release
    
    - name: Test
      run: dotnet test ElectronicJournal/ElectronicJournal.Tests/ElectronicJournal.Tests.csproj --configuration Release --no-build --verbosity normal
